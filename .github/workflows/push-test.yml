name: push-test (temporary)

on:
  workflow_dispatch: {}

jobs:
  push-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Test push to the paired store
        env:
          VAPID_PRIVATE_KEY_PEM: ${{ secrets.VAPID_PRIVATE_KEY_PEM }}
          PUSH_ENC_KEY: ${{ secrets.PUSH_ENC_KEY }}
        run: |
          echo "$VAPID_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/vapid.pem"
          python - <<'PYEOF'
          import json, os
          from pywebpush import webpush
          from shimshim_bot import load_push_subs

          subs = load_push_subs()
          payload = json.dumps({
              "title": "🐶 Self-pairing works!",
              "body": "This device paired itself via @Kahab_bot. Notifications restored.",
              "url": "./",
          })
          for sub in subs:
              webpush(sub, payload,
                      vapid_private_key=os.environ["RUNNER_TEMP"] + "/vapid.pem",
                      vapid_claims={"sub": "mailto:yuval0156@gmail.com"},
                      ttl=86400, headers={"Urgency": "high"})
          print(f"sent to {len(subs)} subscription(s)")
          PYEOF
