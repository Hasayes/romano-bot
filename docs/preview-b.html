<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ShimShim — Preview B: Club Colors</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: #f6f4ef; color: #1c2320; font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding-bottom: 40px; }
  header { position: sticky; top: 0; background: #f6f4efee; backdrop-filter: blur(10px); padding: calc(14px + env(safe-area-inset-top)) 18px 12px; display: flex; align-items: center; gap: 11px; z-index: 5; }
  header img { width: 34px; height: 34px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,.18); }
  header h1 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; }
  main { max-width: 640px; margin: 0 auto; padding: 0 14px; }
  .day { font-size: 14px; font-weight: 800; color: #6b7a72; margin: 24px 6px 10px; }
  .card { background: #fff; border-radius: 20px; margin-bottom: 12px; padding: 15px 16px; box-shadow: 0 3px 14px rgba(28,35,32,.07); }
  .head { display: flex; gap: 12px; align-items: center; }
  .ava { width: 46px; height: 46px; border-radius: 14px; color: #fff; font-weight: 900; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; letter-spacing: .5px; }
  .who { flex: 1; min-width: 0; }
  .player { font-size: 17px; font-weight: 800; }
  .move { font-size: 13px; color: #6b7a72; margin-top: 1px; }
  .stage { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .s-completed { background: #d9f2e2; color: #1c7c43; }
  .s-herewego { background: #fff0c2; color: #9a6b00; }
  .s-medical { background: #dcefff; color: #1663a7; }
  .s-rumour { background: #ece9f7; color: #5b4ea3; }
  .fee { margin-top: 10px; font-size: 14px; font-weight: 700; }
  .more { margin-top: 8px; font-size: 13px; color: #1c7c43; font-weight: 700; cursor: pointer; }
  .detail { display: none; margin-top: 8px; font-size: 14px; color: #454f4a; border-top: 1px solid #eee9df; padding-top: 9px; }
  .card.open .detail { display: block; }
  .card.open .more { display: none; }
  .detail .src { color: #6b7a72; font-size: 12.5px; margin-top: 6px; }
  .note { text-align: center; color: #6b7a72; padding: 26px; }
</style>
</head>
<body>
<header><img src="icon-192.png?v=2" alt=""><h1>ShimShim</h1></header>
<main id="m"><p class="note">Loading…</p></main>
<script>
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const known = v => v && v.trim() !== "" && v.trim() !== "—";
const PALETTE = ["#c0392b","#1a5fb4","#1c7c43","#7b2d8b","#b8860b","#0f7173","#a13d63","#34495e","#d35400","#2d6a4f"];
function avatar(club) {
  const words = club.replace(/[^\p{L}\s]/gu, "").split(/\s+/).filter(Boolean);
  const ini = (words.length >= 2 ? words[0][0] + words[1][0] : club.slice(0, 3)).toUpperCase();
  let h = 0; for (const ch of club) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return `<div class="ava" style="background:${PALETTE[h % PALETTE.length]}">${esc(ini)}</div>`;
}
function dayLabel(ts) {
  const d = new Date(ts), now = new Date();
  const days = Math.floor((now.setHours(0,0,0,0) - new Date(d).setHours(0,0,0,0)) / 864e5);
  return days <= 0 ? "Today" : days === 1 ? "Yesterday" : d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "short" });
}
const stageInfo = i => i.kind === "interest" ? ["s-rumour","👀 Rumour"] :
  ({"Completed":["s-completed","✓ Completed"],"Here we go":["s-herewego","Here we go"],"Medical":["s-medical","Medical"]}[i.stage] || ["s-completed","Deal"]);
fetch(`feed.json?t=${Date.now()}`).then(r => r.json()).then(feed => {
  let html = "", lastDay = "";
  for (const i of feed.slice(0, 60)) {
    const day = dayLabel(i.ts);
    if (day !== lastDay) { html += `<div class="day">${day}</div>`; lastDay = day; }
    const [scls, stxt] = stageInfo(i);
    const mainClub = i.kind === "interest" ? i.to_club.split(",")[0] : i.to_club;
    const move = i.kind === "interest"
      ? `${esc(i.to_club)} in for the ${esc(i.from_club)} man`
      : `${esc(i.from_club)} → ${esc(i.to_club)}`;
    const detail = [known(i.style) && `🎮 ${esc(i.style)}`, known(i.fit) && `🧩 ${esc(i.fit)}`].filter(Boolean).join("<br>");
    html += `<div class="card" onclick="this.classList.toggle('open')">
      <div class="head">${avatar(mainClub)}
        <div class="who"><div class="player">${esc(i.player)}</div><div class="move">${move}</div></div>
        <span class="stage ${scls}">${stxt}</span></div>
      ${known(i.fee) ? `<div class="fee">💰 ${esc(i.fee)}</div>` : ""}
      ${detail ? `<div class="more">More ›</div><div class="detail">${detail}
        ${known(i.source) ? `<div class="src">🗞 ${esc(i.source)}</div>` : ""}</div>` : ""}
    </div>`;
  }
  document.getElementById("m").innerHTML = html;
});
</script>
</body>
</html>
