<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ShimShim — Preview C: Compact</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: #fff; color: #16211b; font: 15px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; padding-bottom: 40px; }
  header { position: sticky; top: 0; background: #fffd; backdrop-filter: blur(8px); padding: calc(12px + env(safe-area-inset-top)) 16px 10px; border-bottom: 1px solid #e5eae7; display: flex; align-items: center; gap: 9px; z-index: 5; }
  header img { width: 26px; height: 26px; border-radius: 50%; }
  header h1 { font-size: 17px; font-weight: 800; }
  main { max-width: 640px; margin: 0 auto; }
  .day { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: #8a968f; padding: 18px 16px 6px; background: #fafbfa; }
  .row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid #f0f3f1; cursor: pointer; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .d-completed { background: #14a44d; }
  .d-herewego { background: #eab308; }
  .d-medical { background: #38bdf8; }
  .d-rumour { background: #c3c9c5; }
  .txt { flex: 1; min-width: 0; }
  .l1 { display: flex; gap: 6px; align-items: baseline; }
  .player { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fee { font-size: 12.5px; color: #14a44d; font-weight: 700; white-space: nowrap; }
  .l2 { font-size: 12.5px; color: #71807a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .when { font-size: 11px; color: #a6b0aa; flex-shrink: 0; }
  .ex { display: none; padding: 4px 16px 14px 35px; font-size: 13.5px; color: #46524c; border-bottom: 1px solid #f0f3f1; background: #fafbfa; }
  .row.open + .ex { display: block; }
  .ex .src { color: #8a968f; font-size: 12px; margin-top: 5px; }
  .note { text-align: center; color: #8a968f; padding: 26px; }
</style>
</head>
<body>
<header><img src="icon-192.png?v=2" alt=""><h1>ShimShim</h1></header>
<main id="m"><p class="note">Loading…</p></main>
<script>
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const known = v => v && v.trim() !== "" && v.trim() !== "—";
function dayLabel(ts) {
  const d = new Date(ts), now = new Date();
  const days = Math.floor((now.setHours(0,0,0,0) - new Date(d).setHours(0,0,0,0)) / 864e5);
  return days <= 0 ? "Today" : days === 1 ? "Yesterday" : d.toLocaleDateString("en-GB", { day: "numeric", month: "long" });
}
const dot = i => i.kind === "interest" ? "d-rumour" : ({"Completed":"d-completed","Here we go":"d-herewego","Medical":"d-medical"}[i.stage] || "d-completed");
fetch(`feed.json?t=${Date.now()}`).then(r => r.json()).then(feed => {
  let html = "", lastDay = "";
  for (const i of feed.slice(0, 80)) {
    const day = dayLabel(i.ts);
    if (day !== lastDay) { html += `<div class="day">${day}</div>`; lastDay = day; }
    const l2 = i.kind === "interest"
      ? `👀 ${esc(i.to_club)} · from ${esc(i.from_club)}`
      : `${esc(i.from_club)} → ${esc(i.to_club)}${i.stage && i.stage !== "—" ? " · " + esc(i.stage) : ""}`;
    const detail = [known(i.style) && esc(i.style), known(i.fit) && esc(i.fit)].filter(Boolean).join(" ");
    html += `<div class="row" onclick="this.classList.toggle('open')">
      <span class="dot ${dot(i)}"></span>
      <div class="txt"><div class="l1"><span class="player">${esc(i.player)}</span>
        ${known(i.fee) ? `<span class="fee">${esc(i.fee.split("(")[0].trim())}</span>` : ""}</div>
      <div class="l2">${l2}</div></div>
      <span class="when">${new Date(i.ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span>
    </div>
    <div class="ex">${detail}${known(i.source) ? `<div class="src">🗞 ${esc(i.source)}</div>` : ""}</div>`;
  }
  document.getElementById("m").innerHTML = html;
});
</script>
</body>
</html>
