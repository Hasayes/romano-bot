<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ShimShim — Preview A: The Wire</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: #0a0c10; color: #e8eaed; font: 15px/1.45 -apple-system, BlinkMacSystemFont, sans-serif; padding-bottom: 40px; }
  header { position: sticky; top: 0; background: #0a0c10ee; backdrop-filter: blur(8px); padding: calc(12px + env(safe-area-inset-top)) 16px 10px; border-bottom: 2px solid #ffd60a; display: flex; align-items: center; gap: 10px; z-index: 5; }
  header img { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ffd60a; }
  header h1 { font-size: 19px; font-weight: 900; letter-spacing: 1px; }
  header .live { margin-left: auto; background: #ffd60a; color: #000; font-size: 11px; font-weight: 900; padding: 3px 8px; border-radius: 4px; letter-spacing: 1px; }
  main { max-width: 640px; margin: 0 auto; padding: 0 12px; }
  .day { font-size: 12px; font-weight: 900; letter-spacing: 2px; color: #ffd60a; margin: 22px 4px 8px; text-transform: uppercase; }
  .card { background: #14171d; border-radius: 10px; margin-bottom: 8px; padding: 12px 14px 12px 16px; position: relative; overflow: hidden; }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .card.completed::before { background: #30d158; }
  .card.herewego::before { background: #ffd60a; }
  .card.medical::before { background: #64d2ff; }
  .card.rumour::before { background: #98989d; }
  .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .player { font-size: 17px; font-weight: 800; }
  .when { font-size: 11px; color: #98989d; white-space: nowrap; }
  .move { font-size: 14px; color: #c7cbd1; margin-top: 3px; }
  .move b { color: #e8eaed; }
  .row2 { display: flex; gap: 8px; margin-top: 7px; align-items: center; flex-wrap: wrap; }
  .stagechip { font-size: 11px; font-weight: 900; letter-spacing: .5px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
  .completed .stagechip { background: #30d15822; color: #30d158; }
  .herewego .stagechip { background: #ffd60a22; color: #ffd60a; }
  .medical .stagechip { background: #64d2ff22; color: #64d2ff; }
  .rumour .stagechip { background: #98989d33; color: #b8b8bd; }
  .fee { font-size: 13px; font-weight: 700; color: #ffd60a; }
  .src { font-size: 12px; color: #98989d; margin-left: auto; }
  .note { text-align: center; color: #98989d; font-size: 13px; padding: 26px 20px; }
</style>
</head>
<body>
<header>
  <img src="icon-192.png?v=2" alt="">
  <h1>SHIMSHIM</h1>
  <span class="live">● WIRE</span>
</header>
<main id="m"><p class="note">Loading…</p></main>
<script>
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const known = v => v && v.trim() !== "" && v.trim() !== "—";
function dayLabel(ts) {
  const d = new Date(ts), now = new Date();
  const days = Math.floor((now.setHours(0,0,0,0) - new Date(d).setHours(0,0,0,0)) / 864e5);
  return days <= 0 ? "Today" : days === 1 ? "Yesterday" : d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
}
const cls = i => i.kind === "interest" ? "rumour" : ({"Completed":"completed","Here we go":"herewego","Medical":"medical"}[i.stage] || "completed");
const stageTxt = i => i.kind === "interest" ? "Rumour" : (i.stage === "—" ? "Deal" : i.stage);
fetch(`feed.json?t=${Date.now()}`).then(r => r.json()).then(feed => {
  let html = "", lastDay = "";
  for (const i of feed.slice(0, 60)) {
    const day = dayLabel(i.ts);
    if (day !== lastDay) { html += `<div class="day">${day}</div>`; lastDay = day; }
    const move = i.kind === "interest"
      ? `<b>${esc(i.to_club)}</b> chasing · from ${esc(i.from_club)}`
      : `${esc(i.from_club)} → <b>${esc(i.to_club)}</b>`;
    html += `<div class="card ${cls(i)}">
      <div class="top"><span class="player">${esc(i.player)}</span>
        <span class="when">${new Date(i.ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span></div>
      <div class="move">${move}</div>
      <div class="row2"><span class="stagechip">${esc(stageTxt(i))}</span>
        ${known(i.fee) ? `<span class="fee">${esc(i.fee.split("(")[0].trim())}</span>` : ""}
        ${known(i.source) ? `<span class="src">${esc(i.source)}</span>` : ""}</div>
    </div>`;
  }
  document.getElementById("m").innerHTML = html;
});
</script>
</body>
</html>
